<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>용병 재선택 시스템 프로토타입</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0d16;
        --panel: #12182b;
        --line: rgba(255, 255, 255, 0.11);
        --text: #eef2ff;
        --muted: #a6b0d2;
        --accent: #6dd7ff;
        --accent-2: #8d75ff;
        --gold: #ffcf70;
        --good: #74e39f;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top, rgba(109, 215, 255, 0.12), transparent 30%),
          linear-gradient(180deg, #090b14 0%, #0d1220 100%);
        color: var(--text);
        overflow: hidden;
      }

      main {
        width: min(430px, 100%);
        height: 100vh;
        margin: 0 auto;
        padding: 12px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }

      .hero {
        padding: 2px 2px 0;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        line-height: 1.15;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .panel {
        min-height: 0;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        box-shadow: var(--shadow);
      }

      .panel-title {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 700;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .chance-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .chance {
        color: var(--gold);
        font-weight: 700;
      }

      .dots {
        display: flex;
        gap: 6px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.15);
      }

      .dot.active {
        background: linear-gradient(135deg, var(--gold), #ff9a67);
        box-shadow: 0 0 10px rgba(255, 207, 112, 0.55);
      }

      .card {
        position: relative;
        overflow: hidden;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(181, 140, 255, 0.45);
        background:
          linear-gradient(135deg, rgba(140, 117, 255, 0.18), rgba(109, 215, 255, 0.12)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        box-shadow:
          inset 0 0 0 1px rgba(181, 140, 255, 0.15),
          0 10px 24px rgba(92, 62, 170, 0.22);
      }

      .card::before,
      .mini-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 45%);
        pointer-events: none;
      }

      .badge {
        display: inline-block;
        margin-bottom: 8px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 207, 112, 0.16);
        color: var(--gold);
        font-size: 11px;
        font-weight: 700;
      }

      .hero-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .portrait {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        font-size: 24px;
        font-weight: 800;
        color: #fff;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.24), transparent 38%),
          linear-gradient(135deg, rgba(140, 114, 255, 0.92), rgba(109, 215, 255, 0.76));
      }

      .name {
        margin-bottom: 2px;
        font-size: 18px;
        font-weight: 700;
      }

      .role {
        color: var(--muted);
        font-size: 12px;
      }

      .desc {
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.35;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .chip {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 11px;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition: transform 0.16s ease, opacity 0.16s ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:active:not(:disabled) {
        transform: translateY(1px);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .spin-button {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
      }

      .spin-button.loading {
        background: linear-gradient(135deg, #4f648d, #5d4ca1);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
      }

      button.choice {
        text-align: left;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--line);
      }

      button.choice.selected {
        border-color: rgba(109, 215, 255, 0.8);
        box-shadow:
          inset 0 0 0 1px rgba(109, 215, 255, 0.25),
          0 0 16px rgba(109, 215, 255, 0.16);
      }

      .status,
      .log,
      .empty {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .status strong,
      .log strong {
        color: var(--text);
      }

      .status {
        min-height: 32px;
        margin-top: 8px;
      }

      .log {
        min-height: 18px;
        margin-top: 8px;
      }

      .top-panel {
        display: grid;
        grid-template-rows: auto auto auto auto 1fr;
        gap: 8px;
      }

      .bottom-panel {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 10px;
      }

      .selection-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .guide {
        color: var(--muted);
        font-size: 11px;
      }

      .section-label {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .two-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mini-card {
        position: relative;
        overflow: hidden;
        min-height: 72px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid rgba(181, 140, 255, 0.32);
        background:
          linear-gradient(135deg, rgba(140, 117, 255, 0.15), rgba(109, 215, 255, 0.1)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      }

      .mini-name {
        display: block;
        margin-bottom: 3px;
        font-size: 13px;
        font-weight: 700;
      }

      .mini-meta {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.3;
      }

      .choice-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        margin-left: auto;
        border-radius: 999px;
        background: rgba(109, 215, 255, 0.16);
        color: var(--accent);
        font-size: 11px;
        font-weight: 800;
      }

      .reveal {
        animation: reveal 0.28s ease;
      }

      .draw-stage {
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .draw-track {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .draw-slot {
        min-height: 50px;
        padding: 8px 6px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      }

      .draw-slot.active {
        border-color: rgba(109, 215, 255, 0.75);
        background: linear-gradient(135deg, rgba(109, 215, 255, 0.18), rgba(141, 117, 255, 0.16));
        transform: translateY(-1px);
        box-shadow: 0 0 16px rgba(109, 215, 255, 0.16);
      }

      .slot-name {
        margin-bottom: 2px;
        font-size: 11px;
        font-weight: 700;
      }

      .slot-role {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.2;
      }

      .draw-caption {
        margin-top: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .result {
        border: 1px solid rgba(116, 227, 159, 0.28);
        background: linear-gradient(135deg, rgba(116, 227, 159, 0.14), rgba(109, 215, 255, 0.08));
      }

      .result-panel {
        animation: finish-pop 0.36s ease;
      }

      .result-copy {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .success-line {
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(116, 227, 159, 0.08);
        border: 1px solid rgba(116, 227, 159, 0.18);
        color: #d8ffe7;
        font-size: 12px;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes finish-pop {
        0% {
          opacity: 0;
          transform: scale(0.96);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="hero">
        <h1>용병 재선택 시스템</h1>
        <p class="sub">고등급 중복 결과를 즉시 확정하지 않고, 원본을 유지한 상태에서 랜덤 후보를 누적한 뒤 마지막에 하나를 선택하는 흐름을 검증합니다.</p>
      </header>

      <section class="panel top-panel">
        <div class="meta">
          <span>현재 획득 결과</span>
          <div class="chance-wrap" id="chanceWrap"></div>
        </div>
        <div id="originalCard"></div>
        <div class="actions">
          <button id="rerollButton" class="spin-button" type="button">전환 진행</button>
          <button id="finalizeButton" class="secondary" type="button">현재 후보로 최종 선택</button>
        </div>
        <div class="status" id="statusBox"></div>
        <div class="draw-stage" id="drawStage" hidden>
          <div class="draw-track" id="drawTrack"></div>
          <div class="draw-caption" id="drawCaption">전환 후보를 생성 중입니다...</div>
        </div>
        <div class="log" id="logBox"></div>
      </section>

      <section class="panel bottom-panel">
        <div>
          <div class="selection-head">
            <h2 class="panel-title">전환 후보</h2>
            <span class="guide">최대 2개 누적</span>
          </div>
          <div id="candidateList" class="list two-col"></div>
        </div>

        <div>
          <div class="selection-head">
            <h2 class="panel-title">최종 선택 후보</h2>
            <span class="guide">원본 포함 1개 선택</span>
          </div>
          <div id="selectionList" class="list"></div>
        </div>

        <div>
          <div class="section-label">최종 결과</div>
          <div id="resultBox" class="empty">아직 최종 선택이 완료되지 않았습니다.</div>
        </div>
      </section>
    </main>

    <script>
      const mercenaryPool = [
        { id: "arkel", name: "아르켈", role: "암속성 / 전열 딜러", desc: "순간 폭딜에 강한 전열형 용병" },
        { id: "seiron", name: "세이론", role: "수속성 / 원거리 딜러", desc: "연속 공격 기반의 안정적인 딜러" },
        { id: "rilmer", name: "릴메르", role: "화속성 / 광역 마도사", desc: "빙결과 폭발을 활용하는 광역형 용병" },
        { id: "dorun", name: "도룬", role: "지속성 / 방어형 탱커", desc: "받는 피해를 흡수하는 방어형 용병" },
        { id: "velka", name: "벨카", role: "화속성 / 광역 마도사", desc: "광역 마법으로 전장을 정리하는 후열형 용병" },
        { id: "raven", name: "레이븐", role: "무속성 / 단일 딜러", desc: "단일 목표 제거에 강한 추적형 용병" },
        { id: "isel", name: "이셀", role: "광속성 / 버퍼", desc: "공격 속도와 치명 보정을 올려주는 지원형 용병" },
        { id: "garos", name: "가로스", role: "토속성 / 브루저", desc: "지속 전투에서 강한 근거리 브루저" }
      ];

      const maxRerolls = 2;
      const original = mercenaryPool[0];
      let remainingRerolls = maxRerolls;
      let candidateIds = [];
      let selectedId = original.id;
      let finalized = false;

      const originalCard = document.getElementById("originalCard");
      const chanceWrap = document.getElementById("chanceWrap");
      const rerollButton = document.getElementById("rerollButton");
      const finalizeButton = document.getElementById("finalizeButton");
      const candidateList = document.getElementById("candidateList");
      const selectionList = document.getElementById("selectionList");
      const statusBox = document.getElementById("statusBox");
      const logBox = document.getElementById("logBox");
      const resultBox = document.getElementById("resultBox");
      const drawStage = document.getElementById("drawStage");
      const drawTrack = document.getElementById("drawTrack");
      const drawCaption = document.getElementById("drawCaption");

      function cardHtml(unit, badge) {
        return `
          <div class="card">
            <div class="badge">${badge}</div>
            <div class="hero-row">
              <div class="portrait">${unit.name.slice(0, 1)}</div>
              <div>
                <div class="name">${unit.name}</div>
                <div class="role">${unit.role}</div>
              </div>
            </div>
            <div class="desc">${unit.desc}</div>
            <div class="chips">
              <span class="chip">고등급</span>
              <span class="chip">원본 유지 가능</span>
            </div>
          </div>
        `;
      }

      function miniCardHtml(unit, label) {
        return `
          <div class="mini-card">
            <span class="mini-name">${label} · ${unit.name}</span>
            <div class="mini-meta">${unit.role}</div>
            <div class="mini-meta">${unit.desc}</div>
          </div>
        `;
      }

      function updateChanceDisplay() {
        const dots = Array.from({ length: maxRerolls }, (_, index) => {
          const active = index < remainingRerolls ? "dot active" : "dot";
          return `<span class="${active}"></span>`;
        }).join("");

        chanceWrap.innerHTML = `
          <span class="chance">전환 기회 ${remainingRerolls}회</span>
          <div class="dots">${dots}</div>
        `;
      }

      function updateStatus() {
        updateChanceDisplay();
        statusBox.innerHTML = `<strong>원본 유지</strong> 상태로 후보를 누적한 뒤 마지막에 원본 포함 1개를 선택합니다.`;
      }

      function renderOriginal() {
        originalCard.innerHTML = cardHtml(original, "고등급 중복");
      }

      function renderCandidates() {
        if (candidateIds.length === 0) {
          candidateList.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">아직 생성된 전환 후보가 없습니다.</div>`;
          return;
        }

        candidateList.innerHTML = candidateIds
          .map((id, index) => {
            const unit = mercenaryPool.find((item) => item.id === id);
            return `<div class="reveal">${miniCardHtml(unit, `후보 ${index + 1}`)}</div>`;
          })
          .join("");
      }

      function renderSelectionOptions() {
        const units = [original, ...candidateIds.map((id) => mercenaryPool.find((item) => item.id === id))];

        selectionList.innerHTML = units
          .map((unit, index) => {
            const label = index === 0 ? "원본" : `후보 ${index}`;
            const isSelected = unit.id === selectedId ? "selected" : "";
            return `
              <button type="button" class="choice ${isSelected}" data-id="${unit.id}" ${finalized ? "disabled" : ""}>
                <span class="mini-name">${label} · ${unit.name}</span>
                ${isSelected ? `<span class="choice-mark">선택</span>` : ``}
                <div class="mini-meta">${unit.role}</div>
              </button>
            `;
          })
          .join("");

        selectionList.querySelectorAll(".choice").forEach((button) => {
          button.addEventListener("click", () => {
            if (finalized) return;
            selectedId = button.dataset.id;
            renderSelectionOptions();
          });
        });
      }

      function availablePool() {
        const excluded = new Set([original.id, ...candidateIds]);
        return mercenaryPool.filter((unit) => !excluded.has(unit.id));
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function renderDrawTrack(pool, activeIndex = -1) {
        drawTrack.innerHTML = pool
          .map((unit, index) => {
            const active = index === activeIndex ? "draw-slot active" : "draw-slot";
            return `
              <div class="${active}">
                <div class="slot-name">${unit.name}</div>
                <div class="slot-role">${unit.role}</div>
              </div>
            `;
          })
          .join("");
      }

      function updateButtons() {
        rerollButton.disabled = finalized || remainingRerolls <= 0 || availablePool().length === 0;
        finalizeButton.disabled = finalized;
      }

      async function reroll() {
        if (finalized || remainingRerolls <= 0) return;

        const pool = availablePool();
        if (pool.length === 0) {
          logBox.textContent = "더 이상 생성 가능한 후보가 없습니다.";
          updateButtons();
          return;
        }

        rerollButton.disabled = true;
        finalizeButton.disabled = true;
        rerollButton.classList.add("loading");
        rerollButton.textContent = "전환 중...";
        drawStage.hidden = false;
        drawCaption.textContent = "전환 후보를 생성 중입니다...";
        renderDrawTrack(pool);

        let activeIndex = 0;
        const loops = Math.min(7, pool.length + 3);
        for (let i = 0; i < loops; i += 1) {
          activeIndex = i % pool.length;
          renderDrawTrack(pool, activeIndex);
          await sleep(110 + i * 18);
        }

        const next = pool[Math.floor(Math.random() * pool.length)];
        const finalIndex = pool.findIndex((unit) => unit.id === next.id);
        renderDrawTrack(pool, finalIndex);
        drawCaption.textContent = `${next.name} 후보가 생성되었습니다.`;
        await sleep(240);

        candidateIds.push(next.id);
        remainingRerolls -= 1;

        if (selectedId === original.id) {
          selectedId = next.id;
        }

        logBox.innerHTML = `<strong>${next.name}</strong> 후보가 추가되었습니다. 남은 전환 기회는 <strong>${remainingRerolls}회</strong>입니다.`;

        updateStatus();
        renderCandidates();
        renderSelectionOptions();
        updateButtons();

        rerollButton.classList.remove("loading");
        rerollButton.textContent = "전환 진행";
      }

      function finalizeSelection() {
        if (finalized) return;

        finalized = true;
        const unit = mercenaryPool.find((item) => item.id === selectedId);
        resultBox.innerHTML = `
          <div class="card result result-panel">
            <div class="badge">최종 선택 완료</div>
            <div class="hero-row">
              <div class="portrait">${unit.name.slice(0, 1)}</div>
              <div>
                <div class="name">${unit.name}</div>
                <div class="role">${unit.role}</div>
              </div>
            </div>
            <div class="desc">${unit.desc}</div>
            <div class="result-copy">원본과 누적 후보를 모두 비교한 뒤 최종 수령으로 확정한 결과입니다.</div>
            <div class="success-line">${unit.name}을(를) 최종 결과로 확정했습니다.</div>
          </div>
        `;
        logBox.innerHTML = `<strong>${unit.name}</strong>을(를) 최종 수령했습니다. 전환 절차가 종료되었습니다.`;
        updateButtons();
        renderSelectionOptions();
      }

      rerollButton.addEventListener("click", reroll);
      finalizeButton.addEventListener("click", finalizeSelection);

      renderOriginal();
      updateStatus();
      renderCandidates();
      renderSelectionOptions();
      updateButtons();
