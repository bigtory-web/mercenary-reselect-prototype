    <style>
      :root {

        --text: #f3f6ff;

          ssrRevealGlint 0.7s ease-out both,
          ssrGlint 2.4s linear 0.8s infinite;

    <script>
      const units = [
        { id: "arkel", name: "\uC544\uB974\uCF08", rarity: "SSR", attr: "D", image: "../assets/icons/01_arkel_dark.png", glow: "rgba(176,99,255,0.72)", edge: "#cc95ff" },
        { id: "seiron", name: "\uC138\uC774\uB860", rarity: "SSR", attr: "W", image: "../assets/icons/02_seiron_water.png", glow: "rgba(86,180,255,0.72)", edge: "#86d7ff" },

        { id: "raven", name: "\uB808\uC774\uBE10", rarity: "SSR", attr: "N", image: "../assets/icons/06_raven_neutral.png", glow: "rgba(188,196,215,0.58)", edge: "#dce4f3" },
        { id: "isel", name: "\uC774\uC140", rarity: "SSR", attr: "L", image: "../assets/icons/07_isel_light.png", glow: "rgba(255,215,114,0.74)", edge: "#fff0a6" },
        { id: "garos", name: "\uAC00\uB85C\uC2A4", rarity: "SSR", attr: "E", image: "../assets/icons/08_garos_earth.png", glow: "rgba(188,132,74,0.70)", edge: "#e7c18d" },
        { id: "sr01", name: "\uC138\uB77C\uD540", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_01.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr02", name: "\uBE0C\uB9AD\uC2A4", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_02.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr03", name: "\uB098\uC77C\uB77C", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_03.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr04", name: "\uCE74\uC778", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_04.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr05", name: "\uC624\uB974\uD39C", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_05.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr06", name: "\uBBF8\uB9AC\uC544", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_06.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr07", name: "\uD558\uC2A4\uD2B8", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_07.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "sr08", name: "\uB85C\uC5D4", rarity: "SR", attr: "S", image: "../assets/icons/sr/mercenary_attr_08.png", glow: "rgba(78,166,255,0.46)", edge: "#73caff" },
        { id: "r01", name: "\uD398\uB978", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_01.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r02", name: "\uD1A0\uBE44\uC544", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_02.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r03", name: "\uB808\uCF54", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_03.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r04", name: "\uB9C8\uC77C", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_04.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r05", name: "\uB2C8\uCE74", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_05.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r06", name: "\uBE0C\uB860", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_06.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r07", name: "\uD0A4\uB974", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_07.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" },
        { id: "r08", name: "\uC0AC\uC57C", rarity: "R", attr: "R", image: "../assets/icons/r/mercenary_08.png", glow: "rgba(255,192,98,0.32)", edge: "#e6c08a" }
      ];

      const unitsById = Object.fromEntries(units.map((unit) => [unit.id, unit]));
      const SSR_IDS = units.filter((unit) => unit.rarity === "SSR").map((unit) => unit.id);
      const SR_IDS = units.filter((unit) => unit.rarity === "SR").map((unit) => unit.id);
      const R_IDS = units.filter((unit) => unit.rarity === "R").map((unit) => unit.id);
      const showcaseIds = ["arkel", "seiron", "rilmer", "dorun", "velka", "raven", "isel", "garos"];
      const initialOwned = {
        arkel: 1,
        seiron: 1,
        rilmer: 1,
        dorun: 1,
        velka: 1,
        sr01: 1,
        sr02: 1,
        sr03: 1,
        sr04: 1,
        sr05: 1,
        sr06: 1,
        sr07: 1,
        sr08: 1,
        r01: 1,
        r02: 1,
        r03: 1,
        r04: 1,
        r05: 1,
        r06: 1,
        r07: 1,
        r08: 1
      };

      let ownedCounts = createOwnedCounts();
      let pendingRows = [];
      let lastSummonResults = [];
      let tokenBalance = 4;
      let gemBalance = 5000;
      let completionState = null;
      let nextRowNumber = 1;

      const dim = document.getElementById("dim");
      const summonGrid = document.getElementById("summonGrid");
      const summonButton = document.getElementById("summonButton");
      const sceneGemCount = document.getElementById("sceneGemCount");
      const addSceneGemButton = document.getElementById("addSceneGemButton");
      const openManageButton = document.getElementById("openManageButton");
      const openInventoryButton = document.getElementById("openInventoryButton");
      const pendingCountBadge = document.getElementById("pendingCountBadge");
      const summonResultModal = document.getElementById("summonResultModal");
      const summonResultGrid = document.getElementById("summonResultGrid");
      const resultGemCount = document.getElementById("resultGemCount");
      const addResultGemButton = document.getElementById("addResultGemButton");
      const resummonButton = document.getElementById("resummonButton");
      const closeSummonResultButton = document.getElementById("closeSummonResultButton");
      const manageModal = document.getElementById("manageModal");
      const manageList = document.getElementById("manageList");
      const tokenCount = document.getElementById("tokenCount");
      const addTokenButton = document.getElementById("addTokenButton");
      const inventoryModal = document.getElementById("inventoryModal");
      const inventoryList = document.getElementById("inventoryList");
      const completionOverlay = document.getElementById("completionOverlay");
      const completionPortrait = document.getElementById("completionPortrait");
      const completionName = document.getElementById("completionName");
      const completionCopy = document.getElementById("completionCopy");
      const completionConfirmButton = document.getElementById("completionConfirmButton");

      function createOwnedCounts() {
        const counts = {};
        units.forEach((unit) => {
          counts[unit.id] = initialOwned[unit.id] || 0;
        });
        return counts;
      }

      function isNewUnit(unitId) {
        return (ownedCounts[unitId] || 0) === 0;
      }

      function rarityRoll() {
        const roll = Math.random() * 100;
        if (roll < 5) return "SSR";
        if (roll < 30) return "SR";
        return "R";
      }

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function closeAllModals() {
        summonResultModal.classList.add("hidden");
        manageModal.classList.add("hidden");
        inventoryModal.classList.add("hidden");
        dim.classList.add("hidden");
      }

      function openModal(modal) {
        closeAllModals();
        modal.classList.remove("hidden");
        dim.classList.remove("hidden");
      }

      function renderSummonGrid() {
        summonGrid.innerHTML = showcaseIds.map((id) => {
          const unit = unitsById[id];
          return `
            <div class="summon-card" style="--glow:${unit.glow}; --edge:${unit.edge};">
              <div class="summon-inner">
                <img src="${unit.image}" alt="${unit.name}" />
              </div>
            </div>
          `;
        }).join("");
      }

      function renderPendingBadge() {
        if (pendingRows.length > 0) {
          pendingCountBadge.textContent = String(pendingRows.length);
          pendingCountBadge.classList.remove("hidden");
        } else {
          pendingCountBadge.classList.add("hidden");
        }
      }

      function canAffordSummon() {
        return gemBalance >= 2000;
      }

      function renderGemState() {
        sceneGemCount.textContent = String(gemBalance);
        resultGemCount.textContent = String(gemBalance);
        summonButton.disabled = !canAffordSummon();
        resummonButton.disabled = !canAffordSummon();
      }

      function renderSummonResults() {
        summonResultGrid.innerHTML = lastSummonResults.map((result) => {
          const unit = unitsById[result.id];
          return `
            <article class="result-card ${result.rarity.toLowerCase()} ${result.rarity === "SSR" ? "result-card-appear" : ""}">
              ${result.isNew ? '<img class="new-badge" src="../assets/ui/new-badge.png" alt="NEW" />' : ""}
              <div class="result-rarity">${result.rarity}</div>
              <div class="result-card-thumb"><img src="${unit.image}" alt="${unit.name}" /></div>
              <div class="result-name">${unit.name}</div>
            </article>
          `;
        }).join("");
      }

      function renderDots(opened) {
        return `
          <div class="dots">
            <span class="dot ${opened < 2 ? "active" : ""}"></span>
            <span class="dot ${opened < 1 ? "active" : ""}"></span>
          </div>
        `;
      }

      function renderSlot(unitId, selected, empty) {
        if (empty) {
          return `
            <div class="slot-card empty">
              <div class="slot-empty">?</div>
              <div></div>
            </div>
          `;
        }
        const unit = unitsById[unitId];
        return `
          <div class="slot-card ${selected ? "selected" : ""}">
            ${isNewUnit(unitId) ? '<img class="new-badge" src="../assets/ui/new-badge.png" alt="NEW" />' : ""}
            ${unit.rarity === "SSR" ? '<div class="slot-ssr-badge">SSR</div>' : ""}
            <div class="slot-mini"><img src="${unit.image}" alt="${unit.name}" /></div>
            <div class="slot-name">${unit.name}</div>
          </div>
        `;
      }

      function renderManageRow(row) {
        const c1Opened = row.opened >= 1;
        const c2Opened = row.opened >= 2;
        const rerollDisabled = row.opened >= 2 || tokenBalance <= 0;
        return `
          <article class="row">
            <div class="row-head">
              <h2 class="row-title">${row.title}</h2>
              <div class="row-meta">
                <span class="row-timer">48시간 남음</span>
                <span>&#51204;&#54872; &#44592;&#54924; ${2 - row.opened}&#54924;</span>
                ${renderDots(row.opened)}
              </div>
            </div>
            <div class="row-body">
              <div class="slot-grid">
                <button class="slot-button" data-select-row="${row.id}" data-select-id="${row.originalId}" type="button">
                  ${renderSlot(row.originalId, row.selectedId === row.originalId, false)}
                </button>
                ${c1Opened
                  ? `<button class="slot-button" data-select-row="${row.id}" data-select-id="${row.candidates[0]}" type="button">
                       ${renderSlot(row.candidates[0], row.selectedId === row.candidates[0], false)}
                     </button>`
                  : renderSlot("", false, true)}
                ${c2Opened
                  ? `<button class="slot-button" data-select-row="${row.id}" data-select-id="${row.candidates[1]}" type="button">
                       ${renderSlot(row.candidates[1], row.selectedId === row.candidates[1], false)}
                     </button>`
                  : renderSlot("", false, true)}
              </div>
              <div class="row-actions">
                <button class="action-button reroll" data-reroll-row="${row.id}" type="button" ${rerollDisabled ? "disabled" : ""}>
                  <span>&#51116;&#49440;&#53469;</span>
                  <span class="action-sub">&#51204;&#54872;&#44592; 1&#44060;</span>
                </button>
                <button class="action-button finalize" data-finalize-row="${row.id}" type="button">
                  <span>&#52572;&#51333; &#49440;&#53469;</span>
                </button>
              </div>
            </div>
          </article>
        `;
      }

      function renderManageList() {
        tokenCount.textContent = String(tokenBalance);
        renderPendingBadge();
        manageList.innerHTML = pendingRows.length
          ? pendingRows.map(renderManageRow).join("")
          : '<div class="empty-state">&#51116;&#49440;&#53469; &#44032;&#45733;&#54620; SSR &#50857;&#48337;&#51060; &#50630;&#49845;&#45768;&#45796;.</div>';
      }

      function renderInventory() {
        const rarityOrder = ["SSR", "SR", "R"];
        inventoryList.innerHTML = rarityOrder.map((rarity) => {
          const owned = units
            .filter((unit) => unit.rarity === rarity && ownedCounts[unit.id] > 0)
            .sort((a, b) => a.name.localeCompare(b.name, "ko"));
          if (!owned.length) return "";
          return `
            <section class="inventory-section">
              <h2 class="inventory-heading">${rarity} &#48372;&#50976; &#50857;&#48337;</h2>
              <div class="inventory-grid">
                ${owned.map((unit) => `
                  <article class="inventory-card">
                    <div class="inventory-card-thumb"><img src="${unit.image}" alt="${unit.name}" /></div>
                    <div class="inventory-name">${unit.name}</div>
                    <div class="inventory-count">&#48372;&#50976; ${ownedCounts[unit.id]}&#47749;</div>
                  </article>
                `).join("")}
              </div>
            </section>
          `;
        }).join("");

        if (!inventoryList.innerHTML.trim()) {
          inventoryList.innerHTML = '<div class="empty-state">&#50500;&#51649; &#54937;&#46301;&#54620; &#50857;&#48337;&#51060; &#50630;&#49845;&#45768;&#45796;.</div>';
        }
      }

      function renderCompletionModal() {
        if (!completionState) {
          completionOverlay.classList.add("hidden");
          return;
        }
        const unit = unitsById[completionState.selectedId];
        completionPortrait.innerHTML = `<img src="${unit.image}" alt="${unit.name}" />`;
        completionName.textContent = unit.name;
        completionCopy.textContent = `${unit.name}\uC744(\uB97C) \uCD5C\uC885 \uC218\uB839\uD588\uC2B5\uB2C8\uB2E4.`;
        completionOverlay.classList.remove("hidden");
      }

      function renderAll() {
        renderSummonGrid();
        renderGemState();
        renderPendingBadge();
        renderManageList();
        renderInventory();
        renderCompletionModal();
      }

      function buildPendingRow(originalId) {
        const candidates = SSR_IDS.filter((id) => id !== originalId).sort(() => Math.random() - 0.5).slice(0, 2);
        const row = {
          id: `pending-${nextRowNumber}`,
          title: `\uC7AC\uC120\uD0DD \uB300\uC0C1 ${nextRowNumber}`,
          originalId,
          candidates,
          selectedId: originalId,
          opened: 0
        };
        nextRowNumber += 1;
        return row;
      }

      function applySummonResults(results) {
        results.forEach((result) => {
          ownedCounts[result.id] += 1;
        });
        results.filter((result) => result.rarity === "SSR").forEach((result) => {
          pendingRows.push(buildPendingRow(result.id));
        });
      }

      function performTenSummon() {
        if (!canAffordSummon()) return;
        gemBalance -= 2000;
        const tempCounts = { ...ownedCounts };
        lastSummonResults = Array.from({ length: 10 }, () => {
          const rarity = rarityRoll();
          const id = rarity === "SSR" ? pick(SSR_IDS) : rarity === "SR" ? pick(SR_IDS) : pick(R_IDS);
          const isNew = (tempCounts[id] || 0) === 0;
          tempCounts[id] = (tempCounts[id] || 0) + 1;
          return { id, rarity, isNew };
        });
        applySummonResults(lastSummonResults);
        renderSummonResults();
        renderAll();
        openModal(summonResultModal);
      }

      function finalizeRow(rowId) {
        const index = pendingRows.findIndex((row) => row.id === rowId);
        if (index === -1) return;
        const row = pendingRows[index];
        if (row.selectedId !== row.originalId) {
          ownedCounts[row.originalId] = Math.max(0, ownedCounts[row.originalId] - 1);
          ownedCounts[row.selectedId] += 1;
        }
        completionState = { selectedId: row.selectedId };
        pendingRows.splice(index, 1);
        renderAll();
      }

      summonButton.addEventListener("click", performTenSummon);
      resummonButton.addEventListener("click", performTenSummon);
      addSceneGemButton.addEventListener("click", () => {
        gemBalance += 5000;
        renderGemState();
      });
      addResultGemButton.addEventListener("click", () => {
        gemBalance += 5000;
        renderGemState();
      });
      openManageButton.addEventListener("click", () => {
        renderManageList();
        openModal(manageModal);
      });
      openInventoryButton.addEventListener("click", () => {
        renderInventory();
        openModal(inventoryModal);
      });
      closeSummonResultButton.addEventListener("click", closeAllModals);
      addTokenButton.addEventListener("click", () => {
        tokenBalance += 10;
        renderManageList();
      });
      completionConfirmButton.addEventListener("click", () => {
        completionState = null;
        completionOverlay.classList.add("hidden");
      });
      document.querySelectorAll("[data-close-modal]").forEach((button) => {
        button.addEventListener("click", closeAllModals);
      });
      manageList.addEventListener("click", (event) => {
        const rerollButton = event.target.closest("[data-reroll-row]");
        if (rerollButton) {
          const row = pendingRows.find((item) => item.id === rerollButton.dataset.rerollRow);
          if (!row || row.opened >= 2 || tokenBalance <= 0) return;
          tokenBalance -= 1;
          row.opened += 1;
          row.selectedId = row.candidates[row.opened - 1];
          renderManageList();
          return;
        }
        const finalizeButton = event.target.closest("[data-finalize-row]");
        if (finalizeButton) {
          finalizeRow(finalizeButton.dataset.finalizeRow);
          return;
        }
        const selectButton = event.target.closest("[data-select-row]");
        if (selectButton) {
          const row = pendingRows.find((item) => item.id === selectButton.dataset.selectRow);
          if (!row) return;
          row.selectedId = selectButton.dataset.selectId;
          renderManageList();
        }
      });

      renderAll();
    </script>
  </body>
</html>
