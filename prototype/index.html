<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>용병 재선택 시스템 프로토타입</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0d16;
        --panel: #12182b;
        --line: rgba(255, 255, 255, 0.12);
        --text: #eef2ff;
        --muted: #a5afd4;
        --accent: #6dd7ff;
        --accent-2: #8c72ff;
        --gold: #ffcf70;
        --good: #74e39f;
        --epic: #b58cff;
        --shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top, rgba(109, 215, 255, 0.14), transparent 30%),
          linear-gradient(180deg, #090b14 0%, #0c1120 100%);
        color: var(--text);
      }

      main {
        width: min(440px, 100%);
        margin: 0 auto;
        padding: 20px 16px 32px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
      }

      .sub {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }

      .panel {
        margin-bottom: 16px;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        box-shadow: var(--shadow);
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .chance-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chance {
        color: var(--gold);
        font-weight: 700;
      }

      .dots {
        display: flex;
        gap: 7px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
      }

      .dot.active {
        background: linear-gradient(135deg, var(--gold), #ff9b68);
        box-shadow: 0 0 10px rgba(255, 207, 112, 0.55);
      }

      .card,
      .mini-card {
        position: relative;
        overflow: hidden;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(135deg, rgba(140, 114, 255, 0.2), rgba(109, 215, 255, 0.12));
      }

      .card.epic,
      .mini-card.epic {
        border-color: rgba(181, 140, 255, 0.45);
        box-shadow:
          inset 0 0 0 1px rgba(181, 140, 255, 0.16),
          0 10px 24px rgba(92, 62, 170, 0.22);
      }

      .card::before,
      .mini-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 45%);
        pointer-events: none;
      }

      .card {
        padding: 14px;
      }

      .mini-card {
        padding: 12px;
      }

      .badge {
        display: inline-block;
        margin-bottom: 10px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 207, 112, 0.16);
        color: var(--gold);
        font-size: 12px;
      }

      .hero-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .portrait {
        width: 68px;
        height: 68px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        font-size: 28px;
        font-weight: 800;
        color: white;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.22), transparent 38%),
          linear-gradient(135deg, rgba(140, 114, 255, 0.9), rgba(109, 215, 255, 0.72));
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,.2),
          0 10px 18px rgba(0,0,0,.18);
      }

      .name {
        margin-bottom: 4px;
        font-size: 22px;
        font-weight: 700;
      }

      .role {
        margin-bottom: 10px;
        color: var(--muted);
      }

      .desc {
        margin-top: 10px;
        font-size: 14px;
        line-height: 1.5;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: transform .16s ease, opacity .16s ease;
        box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:active:not(:disabled) {
        transform: translateY(1px);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: none;
      }

      button.choice {
        text-align: left;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--line);
        box-shadow: none;
      }

      button.choice.selected {
        border-color: rgba(109, 215, 255, 0.8);
        box-shadow:
          0 0 0 1px rgba(109, 215, 255, 0.25) inset,
          0 0 18px rgba(109, 215, 255, 0.18);
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .spin-button.loading {
        background: linear-gradient(135deg, #4f648d, #5d4ca1);
      }

      .status,
      .log,
      .empty {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .status strong,
      .log strong {
        color: var(--text);
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .selection-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .guide {
        color: var(--muted);
        font-size: 13px;
      }

      .mini-name {
        display: block;
        margin-bottom: 4px;
        font-weight: 700;
      }

      .mini-meta {
        color: var(--muted);
        font-size: 13px;
      }

      .reveal {
        animation: reveal .28s ease;
      }

      .result {
        border: 1px solid rgba(116, 227, 159, 0.28);
        background: linear-gradient(135deg, rgba(116, 227, 159, 0.14), rgba(109, 215, 255, 0.08));
      }

      .result-panel {
        animation: finish-pop .36s ease;
      }

      .result-copy {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .success-line {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(116, 227, 159, 0.08);
        border: 1px solid rgba(116, 227, 159, 0.18);
        color: #d8ffe7;
        font-size: 13px;
      }

      .choice-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        margin-left: auto;
        border-radius: 999px;
        background: rgba(109, 215, 255, 0.16);
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
      }

      .draw-stage {
        margin-top: 12px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .draw-track {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .draw-slot {
        min-height: 78px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        display: grid;
        align-content: center;
        text-align: center;
      }

      .draw-slot.active {
        border-color: rgba(109, 215, 255, 0.7);
        background: linear-gradient(135deg, rgba(109, 215, 255, 0.12), rgba(140, 114, 255, 0.12));
        box-shadow: 0 0 0 1px rgba(109, 215, 255, 0.2) inset;
      }

      .draw-slot .slot-name {
        font-weight: 700;
        margin-bottom: 4px;
      }

      .draw-slot .slot-role {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .draw-caption {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      @keyframes reveal {
        from {
          transform: translateY(8px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes finish-pop {
        from {
          transform: scale(.97);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>용병 재선택 시스템</h1>
      <p class="sub">
        고등급 중복 결과를 즉시 확정하지 않고, 원본을 유지한 상태에서 랜덤 후보를 누적한 뒤 마지막에
        하나를 선택하는 흐름을 검증하는 UX 프로토타입입니다.
      </p>

      <section class="panel">
        <div class="meta">
          <span>현재 획득 결과</span>
          <div class="chance-wrap" id="chanceWrap"></div>
        </div>
        <div id="originalCard"></div>
      </section>

      <section class="panel">
        <h2>전환 진행</h2>
        <div class="actions">
          <button id="rerollButton" class="spin-button" type="button">전환 진행</button>
          <button id="finalizeButton" class="secondary" type="button">현재 후보로 최종 선택 진행</button>
        </div>
        <div class="status" id="statusBox"></div>
        <div class="draw-stage" id="drawStage" hidden>
          <div class="draw-track" id="drawTrack"></div>
          <div class="draw-caption" id="drawCaption">전환 후보를 선택 중입니다...</div>
        </div>
      </section>

      <section class="panel">
        <h2>전환 후보 리스트</h2>
        <div id="candidateList" class="list"></div>
      </section>

      <section class="panel">
        <div class="selection-head">
          <h2>최종 선택 후보</h2>
          <span class="guide">원본 포함 1개 선택</span>
        </div>
        <div id="selectionList" class="list"></div>
      </section>

      <section class="panel">
        <h2>진행 로그</h2>
        <div class="log" id="logBox"></div>
      </section>

      <section class="panel">
        <h2>최종 결과</h2>
        <div id="resultBox" class="empty">아직 최종 선택이 완료되지 않았습니다.</div>
      </section>
    </main>

    <script>
      const mercenaryPool = [
        { id: "arkel", name: "아르켈", role: "암속성 / 전열 딜러", desc: "순간 폭딜에 강한 전열형 용병" },
        { id: "seiron", name: "세이론", role: "화속성 / 원거리 딜러", desc: "연속 사격 기반의 후열 딜러" },
        { id: "rilmer", name: "릴메르", role: "수속성 / 지원형 마도사", desc: "회복과 해제를 함께 담당하는 지원형 용병" },
        { id: "dorun", name: "도른", role: "토속성 / 방어형 탱커", desc: "받는 피해를 흡수하는 방어형 탱커" },
        { id: "velka", name: "벨카", role: "풍속성 / 광역 마도사", desc: "광역 마법으로 전장을 정리하는 후열형 용병" },
        { id: "raven", name: "레이븐", role: "무속성 / 암살 딜러", desc: "단일 목표 제거에 강한 암살형 용병" },
        { id: "isel", name: "이셀", role: "광속성 / 버퍼", desc: "공격 속도와 치명 확률을 높이는 지원형 용병" },
        { id: "garos", name: "가로스", role: "화속성 / 브루저", desc: "지속 전투에서 강한 근거리 브루저" }
      ];

      const maxRerolls = 2;
      const original = mercenaryPool[0];
      let remainingRerolls = maxRerolls;
      let candidateIds = [];
      let selectedId = original.id;
      let finalized = false;

      const originalCard = document.getElementById("originalCard");
      const chanceWrap = document.getElementById("chanceWrap");
      const rerollButton = document.getElementById("rerollButton");
      const finalizeButton = document.getElementById("finalizeButton");
      const candidateList = document.getElementById("candidateList");
      const selectionList = document.getElementById("selectionList");
      const statusBox = document.getElementById("statusBox");
      const logBox = document.getElementById("logBox");
      const resultBox = document.getElementById("resultBox");
      const drawStage = document.getElementById("drawStage");
      const drawTrack = document.getElementById("drawTrack");
      const drawCaption = document.getElementById("drawCaption");

      function cardHtml(unit, badge) {
        return `
          <div class="card epic">
            <div class="badge">${badge}</div>
            <div class="hero-row">
              <div class="portrait">${unit.name.slice(0, 1)}</div>
              <div>
                <div class="name">${unit.name}</div>
                <div class="role">${unit.role}</div>
              </div>
            </div>
            <div class="desc">${unit.desc}</div>
            <div class="chips">
              <span class="chip">고등급</span>
              <span class="chip">원본 유지 가능</span>
            </div>
          </div>
        `;
      }

      function miniCardHtml(unit, label) {
        return `
          <div class="mini-card epic">
            <span class="mini-name">${label} - ${unit.name}</span>
            <div class="mini-meta">${unit.role}</div>
            <div class="mini-meta">${unit.desc}</div>
          </div>
        `;
      }

      function updateChanceDisplay() {
        const dots = Array.from({ length: maxRerolls }, (_, index) => {
          const active = index < remainingRerolls ? "dot active" : "dot";
          return `<span class="${active}"></span>`;
        }).join("");

        chanceWrap.innerHTML = `
          <span class="chance">전환 기회 ${remainingRerolls}회</span>
          <div class="dots">${dots}</div>
        `;
      }

      function updateStatus() {
        updateChanceDisplay();
        statusBox.innerHTML = `
          <strong>원본 유지:</strong> 전환을 진행해도 원본 용병은 사라지지 않습니다.<br />
          <strong>후보 중복 없음:</strong> 이미 나온 후보는 다시 등장하지 않습니다.<br />
          <strong>최종 선택:</strong> 원본과 누적 후보 중 1개를 고르면 종료됩니다.
        `;
      }

      function renderOriginal() {
        originalCard.innerHTML = cardHtml(original, "고등급 중복");
      }

      function renderCandidates() {
        if (candidateIds.length === 0) {
          candidateList.innerHTML = `<div class="empty">아직 생성된 전환 후보가 없습니다.</div>`;
          return;
        }

        candidateList.innerHTML = candidateIds
          .map((id, index) => {
            const unit = mercenaryPool.find((item) => item.id === id);
            return `<div class="reveal">${miniCardHtml(unit, `후보 ${index + 1}`)}</div>`;
          })
          .join("");
      }

      function renderSelectionOptions() {
        const units = [original, ...candidateIds.map((id) => mercenaryPool.find((item) => item.id === id))];

        selectionList.innerHTML = units
          .map((unit, index) => {
            const label = index === 0 ? "원본" : `후보 ${index}`;
            const isSelected = unit.id === selectedId ? "selected" : "";
            return `
              <button type="button" class="choice ${isSelected}" data-id="${unit.id}" ${finalized ? "disabled" : ""}>
                <span class="mini-name">${label} - ${unit.name}</span>
                ${isSelected ? `<span class="choice-mark">선택</span>` : ``}
                <div class="mini-meta">${unit.role}</div>
                <div class="mini-meta">${unit.desc}</div>
              </button>
            `;
          })
          .join("");

        selectionList.querySelectorAll(".choice").forEach((button) => {
          button.addEventListener("click", () => {
            if (finalized) return;
            selectedId = button.dataset.id;
            renderSelectionOptions();
          });
        });
      }

      function availablePool() {
        const excluded = new Set([original.id, ...candidateIds]);
        return mercenaryPool.filter((unit) => !excluded.has(unit.id));
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function renderDrawTrack(pool, activeIndex = -1) {
        drawTrack.innerHTML = pool
          .map((unit, index) => {
            const active = index === activeIndex ? "draw-slot active" : "draw-slot";
            return `
              <div class="${active}">
                <div class="slot-name">${unit.name}</div>
                <div class="slot-role">${unit.role}</div>
              </div>
            `;
          })
          .join("");
      }

      function updateButtons() {
        rerollButton.disabled = finalized || remainingRerolls <= 0 || availablePool().length === 0;
        finalizeButton.disabled = finalized;
      }

      async function reroll() {
        if (finalized || remainingRerolls <= 0) return;

        const pool = availablePool();
        if (pool.length === 0) {
          logBox.textContent = "더 이상 생성할 수 있는 후보가 없습니다.";
          updateButtons();
          return;
        }

        rerollButton.disabled = true;
        finalizeButton.disabled = true;
        rerollButton.classList.add("loading");
        rerollButton.textContent = "전환 중...";
        drawStage.hidden = false;
        drawCaption.textContent = "전환 후보를 선택 중입니다...";
        renderDrawTrack(pool);

        let activeIndex = 0;
        const loops = Math.min(7, pool.length + 3);
        for (let i = 0; i < loops; i += 1) {
          activeIndex = i % pool.length;
          renderDrawTrack(pool, activeIndex);
          await sleep(110 + i * 18);
        }

        const next = pool[Math.floor(Math.random() * pool.length)];
        const finalIndex = pool.findIndex((unit) => unit.id === next.id);
        renderDrawTrack(pool, finalIndex);
        drawCaption.textContent = `${next.name} 후보가 선택되었습니다.`;
        await sleep(240);

        candidateIds.push(next.id);
        remainingRerolls -= 1;

        if (selectedId === original.id) {
          selectedId = next.id;
        }

        logBox.innerHTML = `<strong>${next.name}</strong> 후보가 추가되었습니다. 남은 전환 기회는 <strong>${remainingRerolls}회</strong>입니다.`;

        updateStatus();
        renderCandidates();
        renderSelectionOptions();
        updateButtons();

        rerollButton.classList.remove("loading");
        rerollButton.textContent = "전환 진행";
      }

      function finalizeSelection() {
        if (finalized) return;

        finalized = true;
        const unit = mercenaryPool.find((item) => item.id === selectedId);
        resultBox.innerHTML = `
          <div class="card result result-panel epic">
            <div class="badge">최종 선택 완료</div>
            <div class="hero-row">
              <div class="portrait">${unit.name.slice(0, 1)}</div>
              <div>
                <div class="name">${unit.name}</div>
                <div class="role">${unit.role}</div>
              </div>
            </div>
            <div class="desc">${unit.desc}</div>
            <div class="result-copy">
              원본과 전환 후보를 모두 확인한 뒤 최종 수령을 확정한 결과입니다.
            </div>
            <div class="success-line">
              ${unit.name}이(가) 최종 결과로 확정되었습니다.
            </div>
          </div>
        `;
        logBox.innerHTML = `<strong>${unit.name}</strong>을(를) 최종 수령했습니다. 전환 절차가 종료되었습니다.`;
        updateButtons();
        renderSelectionOptions();
      }

      rerollButton.addEventListener("click", reroll);
      finalizeButton.addEventListener("click", finalizeSelection);

      renderOriginal();
      updateStatus();
      renderCandidates();
      renderSelectionOptions();
      updateButtons();
      logBox.innerHTML = `원본 용병을 유지한 상태에서 <strong>전환 진행</strong>을 시작할 수 있습니다.`;
    </script>
  </body>
</html>
