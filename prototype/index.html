<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>용병 재선택 시스템 프로토타입</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111d;
        --panel: #111a2b;
        --panel-2: #162238;
        --line: rgba(255, 255, 255, 0.1);
        --text: #f3f6ff;
        --muted: #9faece;
        --accent: #57c6ff;
        --accent-2: #8470ff;
        --gold: #ffcb6b;
        --good: #78e4aa;
        --danger: #ff8f8f;
        --shadow: 0 16px 30px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(87, 198, 255, 0.16), transparent 24%),
          linear-gradient(180deg, #08101b 0%, #0d1626 100%);
        color: var(--text);
      }

      .app {
        width: min(1460px, 100%);
        height: 100vh;
        margin: 0 auto;
        padding: 18px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 14px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 34px;
        line-height: 1.1;
      }

      .sub {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .header-note {
        color: var(--gold);
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 14px;
      }

      .panel {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
        box-shadow: var(--shadow);
      }

      .left-panel {
        padding: 16px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 12px;
      }

      .right-panel {
        padding: 18px;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 14px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .section-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .section-copy {
        color: var(--muted);
        font-size: 12px;
      }

      .target-list {
        min-height: 0;
        display: grid;
        gap: 10px;
        overflow: auto;
        padding-right: 4px;
      }

      .target-list::-webkit-scrollbar {
        width: 6px;
      }

      .target-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .target-item {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .target-item.active {
        border-color: rgba(87, 198, 255, 0.7);
        box-shadow: inset 0 0 0 1px rgba(87, 198, 255, 0.2);
        background: linear-gradient(135deg, rgba(87, 198, 255, 0.12), rgba(132, 112, 255, 0.08));
      }

      .target-top {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .avatar {
        width: 50px;
        height: 50px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.25), transparent 36%),
          linear-gradient(135deg, rgba(132, 112, 255, 0.95), rgba(87, 198, 255, 0.82));
      }

      .target-name {
        font-size: 18px;
        font-weight: 700;
      }

      .target-role {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      .target-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip {
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 11px;
        background: rgba(255, 255, 255, 0.03);
      }

      .chip.good {
        color: var(--good);
        border-color: rgba(120, 228, 170, 0.22);
      }

      .chip.warn {
        color: var(--gold);
        border-color: rgba(255, 203, 107, 0.22);
      }

      .detail-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
      }

      .detail-note {
        color: var(--muted);
        font-size: 13px;
      }

      .chance-box {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chance-label {
        color: var(--gold);
        font-size: 14px;
        font-weight: 700;
      }

      .dots {
        display: flex;
        gap: 6px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .dot.active {
        background: linear-gradient(135deg, var(--gold), #ff9b67);
        box-shadow: 0 0 10px rgba(255, 203, 107, 0.42);
      }

      .detail-work {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 14px;
      }

      .slot-zone {
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto;
        gap: 14px;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .slot-card {
        min-height: 220px;
        border: 1px solid rgba(139, 120, 255, 0.28);
        border-radius: 20px;
        background:
          linear-gradient(135deg, rgba(132, 112, 255, 0.14), rgba(87, 198, 255, 0.08)),
          rgba(255, 255, 255, 0.025);
        padding: 12px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        overflow: hidden;
      }

      .slot-card.empty {
        border-style: dashed;
        border-color: rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.02);
      }

      .slot-card.active {
        box-shadow: inset 0 0 0 1px rgba(87, 198, 255, 0.28), 0 0 18px rgba(87, 198, 255, 0.1);
      }

      .slot-card.selected {
        border-color: rgba(87, 198, 255, 0.72);
        box-shadow: inset 0 0 0 1px rgba(87, 198, 255, 0.22), 0 0 22px rgba(87, 198, 255, 0.16);
      }

      .slot-badge {
        display: inline-flex;
        width: fit-content;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 203, 107, 0.16);
        color: var(--gold);
        font-size: 11px;
        font-weight: 700;
      }

      .slot-portrait {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        margin: 0 auto;
        font-size: 34px;
        font-weight: 800;
        color: #fff;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.24), transparent 38%),
          linear-gradient(135deg, rgba(132, 112, 255, 0.95), rgba(87, 198, 255, 0.82));
      }

      .slot-empty {
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 15px;
        font-weight: 700;
      }

      .slot-name {
        font-size: 22px;
        font-weight: 700;
      }

      .slot-role {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .slot-desc {
        color: var(--text);
        font-size: 13px;
        line-height: 1.45;
      }

      .action-panel {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 12px;
      }

      .action-box {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .action-label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .action-cost {
        font-size: 26px;
        font-weight: 800;
      }

      .action-hint {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .action-button {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 18px 14px;
        color: #fff;
        font-size: 24px;
        font-weight: 800;
        cursor: pointer;
      }

      .action-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .action-button.reroll {
        background: linear-gradient(135deg, #1c6b8c, #2851b8);
      }

      .action-button.final {
        background: linear-gradient(135deg, #2259a0, #2f7b9b);
      }

      .action-log {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .result-panel {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .result-title {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 700;
      }

      .result-empty {
        color: var(--muted);
        font-size: 13px;
      }

      .result-card {
        border: 1px solid rgba(120, 228, 170, 0.26);
        border-radius: 16px;
        padding: 12px;
        background: linear-gradient(135deg, rgba(120, 228, 170, 0.12), rgba(87, 198, 255, 0.08));
      }

      .result-card strong {
        display: block;
        margin-bottom: 6px;
        font-size: 20px;
      }

      .open-reveal {
        animation: openReveal 0.24s ease;
      }

      @keyframes openReveal {
        from {
          opacity: 0;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 1180px) {
        body {
          overflow: auto;
        }

        .app {
          height: auto;
          min-height: 100vh;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .detail-work {
          grid-template-columns: 1fr;
        }

        .slot-grid {
          grid-template-columns: 1fr;
        }

        .action-panel {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          grid-template-rows: auto auto;
        }

        .action-log {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>용병 재선택 시스템</h1>
          <p class="sub">고등급 중복 결과를 바로 확정하지 않고, 리스트 안에서 재선택 대상을 관리하며 슬롯이 열리면서 후보를 채우는 구조를 검증합니다.</p>
        </div>
        <div class="header-note">가로형 1스크린 프로토타입</div>
      </header>

      <section class="workspace">
        <aside class="panel left-panel">
          <div class="section-head">
            <h2 class="section-title">재선택 대상 리스트</h2>
            <span class="section-copy">여러 대상 동시 관리</span>
          </div>
          <div id="targetList" class="target-list"></div>
        </aside>

        <section class="panel right-panel">
          <div class="detail-top">
            <div>
              <h2 class="section-title">선택 대상 상세</h2>
              <div class="detail-note">원본과 열린 슬롯 결과를 비교한 뒤 최종 선택합니다.</div>
            </div>
            <div class="chance-box" id="chanceBox"></div>
          </div>

          <div class="detail-work">
            <div class="slot-zone">
              <div id="slotGrid" class="slot-grid"></div>
              <div class="result-panel">
                <div class="result-title">최종 결과</div>
                <div id="resultBox" class="result-empty">아직 최종 선택이 완료되지 않았습니다.</div>
              </div>
            </div>

            <div class="action-panel">
              <div class="action-box">
                <div class="action-label">재선택(1/3) 비용</div>
                <div class="action-cost">전환기 1개</div>
                <div class="action-hint">빈 슬롯이 열리면서 새로운 후보가 바로 표시됩니다.</div>
              </div>

              <button id="rerollButton" class="action-button reroll" type="button">재선택</button>
              <button id="finalizeButton" class="action-button final" type="button">최종 선택</button>

              <div id="logBox" class="action-log"></div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const units = {
        arkel: { id: "arkel", name: "아르켈", role: "암속성 / 전열 딜러", desc: "순간 폭딜에 강한 전열형 용병" },
        seiron: { id: "seiron", name: "세이론", role: "수속성 / 원거리 딜러", desc: "연속 공격 기반의 안정적인 딜러" },
        rilmer: { id: "rilmer", name: "릴메르", role: "화속성 / 광역 마도사", desc: "빙결과 폭발을 활용하는 광역형 용병" },
        dorun: { id: "dorun", name: "도룬", role: "지속성 / 방어형 탱커", desc: "받는 피해를 흡수하는 방어형 용병" },
        velka: { id: "velka", name: "벨카", role: "화속성 / 광역 마도사", desc: "광역 마법으로 전장을 정리하는 후열형 용병" },
        raven: { id: "raven", name: "레이븐", role: "무속성 / 단일 딜러", desc: "단일 목표 제거에 강한 추적형 용병" },
        isel: { id: "isel", name: "이셀", role: "광속성 / 버퍼", desc: "공격 속도와 치명 보정을 올려주는 지원형 용병" },
        garos: { id: "garos", name: "가로스", role: "토속성 / 브루저", desc: "지속 전투에서 강한 근거리 브루저" }
      };

      const allIds = Object.keys(units);
      const maxRerolls = 2;

      const targets = [
        createTarget("target-1", "arkel"),
        createTarget("target-2", "velka"),
        createTarget("target-3", "dorun")
      ];

      let activeTargetId = targets[0].id;

      const targetList = document.getElementById("targetList");
      const chanceBox = document.getElementById("chanceBox");
      const slotGrid = document.getElementById("slotGrid");
      const resultBox = document.getElementById("resultBox");
      const rerollButton = document.getElementById("rerollButton");
      const finalizeButton = document.getElementById("finalizeButton");
      const logBox = document.getElementById("logBox");

      function createTarget(id, originalId) {
        return {
          id,
          originalId,
          candidateIds: [],
          remainingRerolls: maxRerolls,
          selectedId: originalId,
          finalized: false
        };
      }

      function getTarget() {
        return targets.find((item) => item.id === activeTargetId);
      }

      function unitPortrait(name) {
        return name.slice(0, 1);
      }

      function renderTargetList() {
        targetList.innerHTML = targets
          .map((target, index) => {
            const unit = units[target.originalId];
            const isActive = target.id === activeTargetId ? "active" : "";
            const stateLabel = target.finalized ? "최종 선택 완료" : `후보 ${target.candidateIds.length} / 2`;
            const chips = [
              `<span class="chip warn">전환 ${target.remainingRerolls}회 남음</span>`,
              target.finalized
                ? `<span class="chip good">확정 완료</span>`
                : `<span class="chip">원본 유지</span>`
            ].join("");

            return `
              <button type="button" class="target-item ${isActive}" data-target-id="${target.id}">
                <div class="target-top">
                  <div class="avatar">${unitPortrait(unit.name)}</div>
                  <div>
                    <div class="target-name">${index + 1}. ${unit.name}</div>
                    <div class="target-role">${unit.role}</div>
                  </div>
                </div>
                <div class="section-copy">${stateLabel}</div>
                <div class="target-meta">${chips}</div>
              </button>
            `;
          })
          .join("");

        targetList.querySelectorAll(".target-item").forEach((button) => {
          button.addEventListener("click", () => {
            activeTargetId = button.dataset.targetId;
            renderAll();
          });
        });
      }

      function renderChanceBox(target) {
        const dots = Array.from({ length: maxRerolls }, (_, index) => {
          const active = index < target.remainingRerolls ? "dot active" : "dot";
          return `<span class="${active}"></span>`;
        }).join("");

        chanceBox.innerHTML = `
          <span class="chance-label">전환 기회 ${target.remainingRerolls}회</span>
          <div class="dots">${dots}</div>
        `;
      }

      function slotCardHtml(unit, options = {}) {
        const { badge, selected = false, empty = false, opened = false } = options;

        if (empty) {
          return `
            <div class="slot-card empty">
              <div class="slot-badge">미개방 슬롯</div>
              <div class="slot-empty">?</div>
              <div class="section-copy">재선택 시 결과 공개</div>
            </div>
          `;
        }

        return `
          <div class="slot-card ${selected ? "selected" : ""} ${opened ? "open-reveal active" : ""}">
            <div class="slot-badge">${badge}</div>
            <div class="slot-portrait">${unitPortrait(unit.name)}</div>
            <div>
              <div class="slot-name">${unit.name}</div>
              <div class="slot-role">${unit.role}</div>
            </div>
            <div class="slot-desc">${unit.desc}</div>
          </div>
        `;
      }

      function renderSlotGrid(target, openedCandidateId = null) {
        const original = units[target.originalId];
        const cards = [];

        cards.push(
          `<button type="button" class="slot-button" data-select-id="${original.id}">${slotCardHtml(original, {
            badge: "원본",
            selected: target.selectedId === original.id
          })}</button>`
        );

        for (let i = 0; i < maxRerolls; i += 1) {
          const candidateId = target.candidateIds[i];
          if (!candidateId) {
            cards.push(slotCardHtml(null, { empty: true }));
            continue;
          }

          const unit = units[candidateId];
          cards.push(
            `<button type="button" class="slot-button" data-select-id="${unit.id}">${slotCardHtml(unit, {
              badge: `후보 ${i + 1}`,
              selected: target.selectedId === unit.id,
              opened: openedCandidateId === unit.id
            })}</button>`
          );
        }

        slotGrid.innerHTML = cards.join("");

        slotGrid.querySelectorAll(".slot-button").forEach((button) => {
          button.style.border = "0";
          button.style.padding = "0";
          button.style.background = "transparent";
          button.style.cursor = target.finalized ? "default" : "pointer";
          if (target.finalized) return;

          button.addEventListener("click", () => {
            target.selectedId = button.dataset.selectId;
            renderSlotGrid(target);
          });
        });
      }

      function renderResult(target) {
        if (!target.finalized) {
          resultBox.className = "result-empty";
          resultBox.textContent = "아직 최종 선택이 완료되지 않았습니다.";
          return;
        }

        const unit = units[target.selectedId];
        resultBox.className = "";
        resultBox.innerHTML = `
          <div class="result-card">
            <strong>${unit.name}</strong>
            <div>${unit.role}</div>
            <div class="action-hint">${unit.desc}</div>
          </div>
        `;
      }

      function renderLog(target) {
        if (target.finalized) {
          const unit = units[target.selectedId];
          logBox.innerHTML = `<strong>${unit.name}</strong>을(를) 최종 수령했습니다. 이 대상은 더 이상 전환하지 않습니다.`;
          return;
        }

        if (target.candidateIds.length === 0) {
          logBox.innerHTML = `현재 선택 대상은 <strong>${units[target.originalId].name}</strong>입니다. 재선택 버튼을 누르면 빈 슬롯이 열리며 결과가 표시됩니다.`;
          return;
        }

        logBox.innerHTML = `후보 <strong>${target.candidateIds.length}개</strong>가 열렸습니다. 원본 포함 비교 후 최종 선택할 수 있습니다.`;
      }

      function updateButtons(target) {
        rerollButton.disabled = target.finalized || target.remainingRerolls <= 0 || availablePool(target).length === 0;
        finalizeButton.disabled = target.finalized;
      }

      function availablePool(target) {
        const excluded = new Set([target.originalId, ...target.candidateIds]);
        return allIds.filter((id) => !excluded.has(id));
      }

      async function revealCandidate() {
        const target = getTarget();
        if (target.finalized || target.remainingRerolls <= 0) return;

        const pool = availablePool(target);
        if (pool.length === 0) {
          logBox.textContent = "더 이상 열 수 있는 후보가 없습니다.";
          updateButtons(target);
          return;
        }

        rerollButton.disabled = true;
        const nextId = pool[Math.floor(Math.random() * pool.length)];
        target.candidateIds.push(nextId);
        target.remainingRerolls -= 1;
        target.selectedId = nextId;

        renderTargetList();
        renderChanceBox(target);
        renderSlotGrid(target, nextId);
        renderResult(target);
        renderLog(target);
        updateButtons(target);
      }

      function finalizeTarget() {
        const target = getTarget();
        if (target.finalized) return;
        target.finalized = true;
        renderTargetList();
        renderChanceBox(target);
        renderSlotGrid(target);
        renderResult(target);
        renderLog(target);
        updateButtons(target);
      }

      function renderAll(openedCandidateId = null) {
        const target = getTarget();
        renderTargetList();
        renderChanceBox(target);
        renderSlotGrid(target, openedCandidateId);
        renderResult(target);
        renderLog(target);
        updateButtons(target);
      }

      rerollButton.addEventListener("click", revealCandidate);
      finalizeButton.addEventListener("click", finalizeTarget);

      renderAll();
    </script>
  </body>
</html>
