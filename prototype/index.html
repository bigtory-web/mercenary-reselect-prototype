<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>용병 재선택 시스템 프로토타입</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111d;
        --panel: #182436;
        --panel-2: #101927;
        --line: rgba(255, 255, 255, 0.08);
        --text: #f3f6ff;
        --muted: #9baccd;
        --blue: #5bc2ff;
        --gold: #ffca69;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: radial-gradient(circle at top, #101f39 0%, #050b16 65%);
        color: var(--text);
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      }

      button {
        font: inherit;
      }

      .stage {
        position: relative;
        width: min(calc(100vw - 48px), calc((100vh - 48px) * 16 / 9));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 18px;
        background:
          radial-gradient(circle at 30% 15%, rgba(122, 116, 255, 0.18), transparent 26%),
          radial-gradient(circle at 72% 24%, rgba(68, 151, 255, 0.16), transparent 24%),
          linear-gradient(180deg, #0c1630 0%, #08101d 100%);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(transparent 84%, rgba(0, 0, 0, 0.18) 84%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 100% 100%, 74px 74px, 74px 74px;
        opacity: 0.58;
        pointer-events: none;
      }

      .summon-scene {
        position: absolute;
        inset: 0;
        padding: 18px 22px 22px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        z-index: 0;
      }

      .scene-top {
        position: relative;
        display: flex;
        justify-content: flex-start;
        align-items: start;
        min-height: 72px;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .brand-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        border: 1px solid rgba(117, 158, 255, 0.2);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(150, 185, 255, 0.7);
        font-size: 16px;
      }

      .brand-line {
        width: 280px;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(123, 167, 255, 0.92), rgba(123, 167, 255, 0));
      }

      .scene-actions {
        position: absolute;
        right: 0;
        top: 0;
        display: flex;
        align-items: start;
        gap: 10px;
      }

      .manage-entry {
        position: relative;
        top: 2px;
        display: grid;
        justify-items: center;
        gap: 6px;
      }

      .manage-entry-button {
        width: 56px;
        height: 56px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        background: rgba(14, 24, 42, 0.72);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
        display: grid;
        place-items: center;
        cursor: pointer;
      }

      .manage-entry-button img {
        width: 38px;
        height: 38px;
        object-fit: contain;
        display: block;
      }

      .manage-entry-label {
        color: #dce6ff;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .scene-icon {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(14, 24, 42, 0.58);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 20px;
      }

      .scene-center {
        position: relative;
        display: grid;
        place-items: center;
        z-index: 1;
      }

      .summon-circle {
        position: absolute;
        width: min(56vw, 660px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(60, 112, 255, 0.18) 0%, rgba(60, 112, 255, 0.02) 46%, transparent 66%),
          radial-gradient(circle, rgba(255, 193, 94, 0.14) 0%, rgba(255, 193, 94, 0.02) 54%, transparent 70%);
        border: 1px solid rgba(255, 223, 160, 0.08);
        opacity: 0.8;
      }

      .summon-circle::before,
      .summon-circle::after {
        content: "";
        position: absolute;
        inset: 9%;
        border-radius: 50%;
        border: 1px solid rgba(255, 210, 120, 0.12);
      }

      .summon-circle::after {
        inset: 18%;
        border-color: rgba(104, 157, 255, 0.14);
      }

      .summon-grid {
        position: relative;
        z-index: 1;
        width: min(64%, 920px);
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px 22px;
        justify-items: center;
      }

      .summon-card {
        width: 136px;
        aspect-ratio: 1;
        padding: 7px;
        border-radius: 16px;
        position: relative;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          rgba(10, 16, 29, 0.8);
        border: 2px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 10px 26px rgba(0, 0, 0, 0.36);
        overflow: hidden;
      }

      .summon-card::before {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 20px;
        background: var(--glow);
        opacity: 0.68;
        filter: blur(16px);
        z-index: 0;
      }

      .summon-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 16px;
        border: 2px solid var(--edge);
        box-shadow: inset 0 0 14px rgba(255, 255, 255, 0.12);
        pointer-events: none;
      }

      .summon-inner {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.14);
      }

      .summon-inner img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .summon-attr {
        position: absolute;
        left: 10px;
        top: 10px;
        z-index: 2;
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(10, 18, 32, 0.62);
        display: grid;
        place-items: center;
        font-size: 14px;
        line-height: 1;
      }

      .scene-bottom {
        position: relative;
        display: grid;
        justify-items: center;
        align-content: end;
        gap: 16px;
      }

      .summon-button-wrap {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .summon-button-wrap::before,
      .summon-button-wrap::after {
        content: "✧";
        color: rgba(109, 144, 255, 0.56);
        font-size: 28px;
      }

      .bottom-button {
        min-width: 228px;
        height: 66px;
        border: 0;
        border-radius: 20px;
        background: linear-gradient(135deg, #2f7ae8, #53b7ff);
        color: #fff;
        font-size: 20px;
        font-weight: 900;
        box-shadow: 0 10px 28px rgba(38, 110, 214, 0.34);
        cursor: pointer;
      }

      .dim {
        position: absolute;
        inset: 0;
        background: rgba(2, 7, 15, 0.56);
        backdrop-filter: blur(6px);
        z-index: 20;
      }

      .hidden {
        display: none !important;
      }

      .popup {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(58%, 740px);
        height: min(78%, 620px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(22, 34, 53, 0.97), rgba(10, 17, 28, 0.98));
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
        overflow: hidden;
        z-index: 30;
      }

      .popup-head {
        padding: 14px 16px 12px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .popup-title {
        margin: 0;
        font-size: 24px;
        font-weight: 900;
        line-height: 1.05;
        text-align: center;
      }

      .popup-currency {
        position: absolute;
        right: 60px;
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
      }

      .currency-icon {
        width: 30px;
        height: 18px;
        object-fit: contain;
        display: block;
      }

      .close-button {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 17px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
      }

      .popup-body {
        min-height: 0;
        overflow: hidden;
        padding: 12px;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .list {
        height: 100%;
        display: grid;
        gap: 10px;
        overflow: auto;
        padding-right: 4px;
        align-content: start;
      }

      .list::-webkit-scrollbar {
        width: 6px;
      }

      .list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .popup-foot {
        color: var(--muted);
        font-size: 11px;
        text-align: center;
      }

      .empty-state {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        text-align: center;
      }

      .row {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        padding: 12px;
      }

      .row-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .row-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
      }

      .row-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .dots {
        display: flex;
        gap: 4px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
      }

      .dot.active {
        background: #ffb25a;
      }

      .row-body {
        display: grid;
        grid-template-columns: 1fr 128px;
        gap: 10px;
        align-items: stretch;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .slot-button {
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      .slot-card {
        position: relative;
        min-height: 122px;
        border-radius: 16px;
        border: 1px solid rgba(126, 146, 198, 0.28);
        background: linear-gradient(180deg, rgba(52, 61, 106, 0.88), rgba(26, 39, 61, 0.96));
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 8px;
        padding: 10px 12px;
      }

      .slot-card.selected {
        border-color: var(--blue);
        box-shadow: 0 0 0 1px rgba(91, 194, 255, 0.28) inset, 0 0 18px rgba(91, 194, 255, 0.18);
      }

      .slot-card.empty {
        border-style: dashed;
        border-color: rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
      }

      .slot-mini {
        width: 74px;
        height: 74px;
        border-radius: 16px;
        overflow: hidden;
      }

      .slot-mini img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .slot-name {
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .slot-empty {
        font-size: 24px;
        font-weight: 900;
        line-height: 1;
      }

      .new-badge {
        position: absolute;
        left: -2px;
        top: -2px;
        width: 42px;
        height: 42px;
        object-fit: contain;
        pointer-events: none;
      }

      .row-actions {
        display: grid;
        align-content: center;
        gap: 8px;
      }

      .action-button {
        min-height: 48px;
        border: 0;
        border-radius: 14px;
        color: #fff;
        font-size: 13px;
        font-weight: 900;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .action-button .action-sub {
        font-size: 10px;
        font-weight: 700;
        opacity: 0.88;
      }

      .action-button.reroll {
        background: linear-gradient(135deg, #2c86bf, #2956cb);
      }

      .action-button.finalize {
        background: linear-gradient(135deg, #2f7ca3, #47a4cc);
      }

      .action-button:disabled {
        background: rgba(79, 102, 140, 0.5);
        color: rgba(255, 255, 255, 0.62);
        cursor: default;
      }

      .completion-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(2, 7, 15, 0.58);
        backdrop-filter: blur(4px);
        z-index: 40;
      }

      .completion-modal {
        width: min(340px, calc(100% - 32px));
        padding: 22px 20px 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(22, 34, 53, 0.97), rgba(10, 17, 28, 0.98));
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      .completion-label {
        color: var(--gold);
        font-size: 12px;
        font-weight: 900;
        margin-bottom: 8px;
      }

      .completion-portrait {
        width: 86px;
        height: 86px;
        margin: 0 auto 10px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }

      .completion-portrait img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .completion-name {
        font-size: 22px;
        font-weight: 900;
        margin-bottom: 8px;
      }

      .completion-copy {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 14px;
      }

      .completion-button {
        min-width: 120px;
        height: 44px;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(135deg, #2f7ae8, #53b7ff);
        color: #fff;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
      }

      @media (max-width: 1200px) {
        .summon-grid {
          width: 76%;
          gap: 16px 18px;
        }

        .summon-card {
          width: 124px;
        }
      }

      @media (max-width: 980px) {
        .popup {
          width: calc(100vw - 24px);
          height: calc(100vh - 24px);
        }

        .popup-currency {
          right: 56px;
          padding-inline: 8px;
          font-size: 11px;
        }

        .row-body {
          grid-template-columns: 1fr;
        }

        .slot-grid {
          grid-template-columns: 1fr;
        }

        .row-actions {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="summon-scene">
        <div class="scene-top">
          <div class="brand">
            <div class="brand-title">
              <div class="brand-mark">✦</div>
              <span>크로니클 키우기</span>
            </div>
            <div class="brand-line"></div>
          </div>
          <div class="scene-actions">
            <div class="manage-entry">
              <button class="manage-entry-button" id="openPopupButton" type="button" aria-label="용병 재선택 열기">
                <img src="../assets/ui/manage-reselect.png" alt="확정 관리 아이콘" />
              </button>
              <div class="manage-entry-label">확정 관리</div>
            </div>
            <div class="scene-icon">⚙</div>
          </div>
        </div>

        <div class="scene-center">
          <div class="summon-circle"></div>
          <div class="summon-grid" id="summonGrid"></div>
        </div>

        <div class="scene-bottom">
          <div class="summon-button-wrap">
            <button class="bottom-button" id="summonButton" type="button">10회 소환</button>
          </div>
        </div>
      </div>

      <div class="dim hidden" id="dim"></div>

      <section class="popup hidden" id="popup" aria-label="용병 재선택 팝업">
        <header class="popup-head">
          <h1 class="popup-title">용병 재선택</h1>
          <div class="popup-currency" id="currencyBox">
            <img class="currency-icon" src="../assets/ui/reroll-ticket.png" alt="전환기 티켓" />
            <span id="tokenCount">0</span>
          </div>
          <button class="close-button" id="closePopupButton" type="button" aria-label="닫기">×</button>
        </header>

        <div class="popup-body">
          <div class="list" id="list"></div>
          <div class="popup-foot">원본은 유지되며, 열린 후보 슬롯 중 하나를 최종 선택합니다.</div>
        </div>
      </section>

      <div class="completion-overlay hidden" id="completionOverlay">
        <div class="completion-modal" role="dialog" aria-modal="true" aria-label="선택 완료 팝업">
          <div class="completion-label">선택 완료</div>
          <div class="completion-portrait" id="completionPortrait">?</div>
          <div class="completion-name" id="completionName">용병</div>
          <div class="completion-copy" id="completionCopy">선택된 용병을 수령했습니다.</div>
          <button class="completion-button" id="completionConfirmButton" type="button">확인</button>
        </div>
      </div>
    </main>

    <script>
      const units = {
        arkel: { name: "아르켈", attr: "☾", image: "../assets/icons/01_arkel_dark.png", glow: "rgba(176, 99, 255, 0.72)", edge: "#cc95ff" },
        seiron: { name: "세이론", attr: "💧", image: "../assets/icons/02_seiron_water.png", glow: "rgba(86, 180, 255, 0.72)", edge: "#86d7ff" },
        rilmer: { name: "릴메르", attr: "🔥", image: "../assets/icons/03_lilmer_fire.png", glow: "rgba(255, 122, 74, 0.74)", edge: "#ffb067" },
        dorun: { name: "도룬", attr: "🌿", image: "../assets/icons/04_dorun_nature.png", glow: "rgba(126, 220, 88, 0.72)", edge: "#b8ff8d" },
        velka: { name: "벨카", attr: "🔥", image: "../assets/icons/05_belka_fire.png", glow: "rgba(255, 122, 74, 0.74)", edge: "#ffb067" },
        raven: { name: "레이븐", attr: "✶", image: "../assets/icons/06_raven_neutral.png", glow: "rgba(188, 196, 215, 0.58)", edge: "#dce4f3" },
        isel: { name: "이셀", attr: "✦", image: "../assets/icons/07_isel_light.png", glow: "rgba(255, 215, 114, 0.74)", edge: "#fff0a6" },
        garos: { name: "가로스", attr: "⛰", image: "../assets/icons/08_garos_earth.png", glow: "rgba(188, 132, 74, 0.7)", edge: "#e7c18d" }
      };

      const summonOrder = ["arkel", "seiron", "rilmer", "dorun", "velka", "raven", "isel", "garos"];
      const pools = [
        ["arkel", "isel", "dorun"],
        ["velka", "seiron", "rilmer"],
        ["dorun", "raven", "garos"]
      ];

      const ownedUnits = new Set(["arkel", "seiron", "rilmer", "dorun", "velka", "raven"]);

      let state = pools.map((pool, index) => ({
        id: `row-${index + 1}`,
        title: `재선택 대상 ${index + 1}`,
        pool,
        selected: pool[0],
        opened: 0,
        finalized: false
      }));

      let tokenBalance = 4;
      let completionState = null;

      const popup = document.getElementById("popup");
      const dim = document.getElementById("dim");
      const list = document.getElementById("list");
      const summonGrid = document.getElementById("summonGrid");
      const openPopupButton = document.getElementById("openPopupButton");
      const summonButton = document.getElementById("summonButton");
      const closePopupButton = document.getElementById("closePopupButton");
      const tokenCount = document.getElementById("tokenCount");
      const completionOverlay = document.getElementById("completionOverlay");
      const completionPortrait = document.getElementById("completionPortrait");
      const completionName = document.getElementById("completionName");
      const completionCopy = document.getElementById("completionCopy");
      const completionConfirmButton = document.getElementById("completionConfirmButton");

      function resetState() {
        state = pools.map((pool, index) => ({
          id: `row-${index + 1}`,
          title: `재선택 대상 ${index + 1}`,
          pool,
          selected: pool[0],
          opened: 0,
          finalized: false
        }));
        tokenBalance = 4;
        completionState = null;
      }

      function renderSummonGrid() {
        summonGrid.innerHTML = summonOrder
          .map((id) => {
            const unit = units[id];
            return `
              <div class="summon-card" style="--glow:${unit.glow}; --edge:${unit.edge};">
                <div class="summon-attr">${unit.attr}</div>
                <div class="summon-inner">
                  <img src="${unit.image}" alt="${unit.name} 아이콘" />
                </div>
              </div>
            `;
          })
          .join("");
      }

      function renderDots(opened) {
        return `
          <div class="dots">
            <span class="dot ${opened < 2 ? "active" : ""}"></span>
            <span class="dot ${opened < 1 ? "active" : ""}"></span>
          </div>
        `;
      }

      function renderSlot(id, selected, empty = false) {
        if (empty) {
          return `
            <div class="slot-card empty">
              <div class="slot-empty">?</div>
              <div></div>
            </div>
          `;
        }

        const unit = units[id];
        return `
          <div class="slot-card ${selected ? "selected" : ""}">
            ${ownedUnits.has(id) ? "" : '<img class="new-badge" src="../assets/ui/new-badge.png" alt="NEW" />'}
            <div class="slot-mini"><img src="${unit.image}" alt="${unit.name} 아이콘" /></div>
            <div class="slot-name">${unit.name}</div>
          </div>
        `;
      }

      function renderRow(row) {
        const [original, candidate1, candidate2] = row.pool;
        const c1Opened = row.opened >= 1;
        const c2Opened = row.opened >= 2;
        const rerollDisabled = row.finalized || row.opened >= 2 || tokenBalance <= 0;

        return `
          <article class="row">
            <div class="row-head">
              <h2 class="row-title">${row.title}</h2>
              <div class="row-meta">
                <span>전환 기회 ${2 - row.opened}회</span>
                ${renderDots(row.opened)}
              </div>
            </div>
            <div class="row-body">
              <div class="slot-grid">
                <button class="slot-button" data-select="${original}" data-row="${row.id}" ${row.finalized ? "disabled" : ""}>
                  ${renderSlot(original, row.selected === original)}
                </button>
                ${
                  c1Opened
                    ? `<button class="slot-button" data-select="${candidate1}" data-row="${row.id}" ${row.finalized ? "disabled" : ""}>
                         ${renderSlot(candidate1, row.selected === candidate1)}
                       </button>`
                    : renderSlot("", false, true)
                }
                ${
                  c2Opened
                    ? `<button class="slot-button" data-select="${candidate2}" data-row="${row.id}" ${row.finalized ? "disabled" : ""}>
                         ${renderSlot(candidate2, row.selected === candidate2)}
                       </button>`
                    : renderSlot("", false, true)
                }
              </div>

              <div class="row-actions">
                <button class="action-button reroll" data-reroll="${row.id}" ${rerollDisabled ? "disabled" : ""}>
                  <span>재선택</span>
                  <span class="action-sub">전환기 1개</span>
                </button>
                <button class="action-button finalize" data-finalize="${row.id}" ${row.finalized ? "disabled" : ""}>
                  <span>${row.finalized ? "선택 완료" : "최종 선택"}</span>
                </button>
              </div>
            </div>
          </article>
        `;
      }

      function renderCompletionModal() {
        if (!completionState) {
          completionOverlay.classList.add("hidden");
          return;
        }

        const unit = units[completionState.selected];
        completionPortrait.innerHTML = `<img src="${unit.image}" alt="${unit.name} 아이콘" />`;
        completionName.textContent = unit.name;
        completionCopy.textContent = `${unit.name}을(를) 최종 수령했습니다.`;
        completionOverlay.classList.remove("hidden");
      }

      function bindEvents() {
        list.querySelectorAll("[data-reroll]").forEach((button) => {
          button.addEventListener("click", () => {
            const row = state.find((item) => item.id === button.dataset.reroll);
            if (!row || row.finalized || row.opened >= 2 || tokenBalance <= 0) return;
            tokenBalance -= 1;
            row.opened += 1;
            row.selected = row.pool[row.opened];
            render();
          });
        });

        list.querySelectorAll("[data-finalize]").forEach((button) => {
          button.addEventListener("click", () => {
            const rowIndex = state.findIndex((item) => item.id === button.dataset.finalize);
            if (rowIndex === -1) return;

            const row = state[rowIndex];
            if (!row || row.finalized) return;

            completionState = {
              id: row.id,
              selected: row.selected
            };

            state.splice(rowIndex, 1);
            render();
          });
        });

        list.querySelectorAll("[data-select]").forEach((button) => {
          button.addEventListener("click", () => {
            const row = state.find((item) => item.id === button.dataset.row);
            if (!row || row.finalized) return;
            row.selected = button.dataset.select;
            render();
          });
        });
      }

      function render() {
        tokenCount.textContent = tokenBalance;
        list.innerHTML = state.length
          ? state.map(renderRow).join("")
          : `<div class="empty-state">재선택 가능한 대상이 없습니다.</div>`;
        bindEvents();
        renderCompletionModal();
      }

      openPopupButton.addEventListener("click", () => {
        popup.classList.remove("hidden");
        dim.classList.remove("hidden");
      });

      closePopupButton.addEventListener("click", () => {
        popup.classList.add("hidden");
        dim.classList.add("hidden");
        completionState = null;
        completionOverlay.classList.add("hidden");
      });

      summonButton.addEventListener("click", () => {
        resetState();
        popup.classList.add("hidden");
        dim.classList.add("hidden");
        completionOverlay.classList.add("hidden");
        render();
      });

      completionConfirmButton.addEventListener("click", () => {
        completionState = null;
        completionOverlay.classList.add("hidden");
      });

      renderSummonGrid();
      resetState();
      render();
    </script>
  </body>
</html>
